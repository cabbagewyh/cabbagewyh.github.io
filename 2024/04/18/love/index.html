    <!-- Completely eliminate flash of wrong theme -->
    <script>
        (function() {
            const THEME_KEY = "REDEFINE-THEME-STATUS";
            const DARK = "dark", LIGHT = "light";
            
            // Get preferred theme
            function getTheme() {
                try {
                    const saved = localStorage.getItem(THEME_KEY);
                    if (saved) {
                        const { isDark } = JSON.parse(saved);
                        return isDark ? DARK : LIGHT;
                    }
                } catch (e) {}
                
                return matchMedia("(prefers-color-scheme: dark)").matches ? DARK : LIGHT;
            }
            
            // Apply theme to document
            function applyTheme(theme) {
                const isDark = theme === DARK;
                const root = document.documentElement;
                
                // Set classes for compatibility
                root.classList.add(theme);
                root.classList.remove(isDark ? LIGHT : DARK);
                root.style.colorScheme = theme;
            }
            
            // Initial application
            const theme = getTheme();
            applyTheme(theme);
            
            // Listen for system preference changes
            matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ({ matches }) => {
                // Only update if using system preference (no localStorage entry)
                if (!localStorage.getItem(THEME_KEY)) {
                    applyTheme(matches ? DARK : LIGHT);
                }
            });
            
            // Set body classes ASAP (before DOMContentLoaded)
            (function() {
                const addBodyClass = () => {
                    const b = document.body;
                    if (!b) return false;
                    b.classList.add(theme + "-mode");
                    return true;
                };

                // Try immediately
                if (addBodyClass()) return;

                // Observe until body exists
                const mo = new MutationObserver(() => {
                    if (addBodyClass()) mo.disconnect();
                });
                mo.observe(document.documentElement, { childList: true, subtree: true });
            })();
        })();
    </script>

&lt;script&gt;
    const slides = document.querySelectorAll(&#39;.slide&#39;);
    const dotsContainer = document.getElementById(&#39;dots&#39;);
    const progressFill = document.getElementById(&#39;progressFill&#39;);
    const totalSlides = slides.length;
    let currentSlide = 0;
    let isPlaying = true;
    let autoPlayInterval = null;
    let progressInterval = null;
    const SLIDE_DURATION = 4000;
    const PROGRESS_STEP = 50;

    // Create dots
    slides.forEach((_, i) =&gt; &#123;
        const dot = document.createElement(&#39;button&#39;);
        dot.classList.add(&#39;dot&#39;);
        if (i === 0) dot.classList.add(&#39;active&#39;);
        dot.addEventListener(&#39;click&#39;, () =&gt; goToSlide(i));
        dotsContainer.appendChild(dot);
    &#125;);

    function updateDots() &#123;
        document.querySelectorAll(&#39;.dot&#39;).forEach((d, i) =&gt; &#123;
            d.classList.toggle(&#39;active&#39;, i === currentSlide);
        &#125;);
    &#125;

    function goToSlide(index) &#123;
        slides[currentSlide].classList.remove(&#39;active&#39;);
        currentSlide = (index + totalSlides) % totalSlides;
        slides[currentSlide].classList.add(&#39;active&#39;);
        updateDots();
        resetProgress();
    &#125;

    function changeSlide(direction) &#123;
        goToSlide(currentSlide + direction);
    &#125;

    function resetProgress() &#123;
        progressFill.style.transition = &#39;none&#39;;
        progressFill.style.width = &#39;0%&#39;;
        requestAnimationFrame(() =&gt; &#123;
            requestAnimationFrame(() =&gt; &#123;
                progressFill.style.transition = &#39;none&#39;;
            &#125;);
        &#125;);
    &#125;

    function startProgress() &#123;
        let elapsed = 0;
        clearInterval(progressInterval);
        progressInterval = setInterval(() =&gt; &#123;
            if (!isPlaying) return;
            elapsed += PROGRESS_STEP;
            const pct = Math.min((elapsed / SLIDE_DURATION) * 100, 100);
            progressFill.style.width = pct + &#39;%&#39;;
            if (elapsed &gt;= SLIDE_DURATION) &#123;
                changeSlide(1);
                elapsed = 0;
            &#125;
        &#125;, PROGRESS_STEP);
    &#125;

    function createHearts() &#123;
        const container = document.getElementById(&#39;heartsBg&#39;);
        const hearts = [&#39;♥&#39;, &#39;♡&#39;, &#39;❤&#39;, &#39;💕&#39;, &#39;✿&#39;];

            h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            h.style.left = Math.random() * 100 + &#39;vw&#39;;
            h.style.fontSize = (Math.random() * 18 + 12) + &#39;px&#39;;
            h.style.animationDuration = (Math.random() * 10 + 10) + &#39;s&#39;;

            container.appendChild(h);
        &#125;
    &#125;

    // Click carousel to toggle play
    document.getElementById(&#39;carousel&#39;).addEventListener(&#39;click&#39;, (e) =&gt; &#123;
        if (e.target.closest(&#39;.nav-btn&#39;) || e.target.closest(&#39;.dot&#39;)) return;
        isPlaying = !isPlaying;
    &#125;);

    // Keyboard nav
    document.addEventListener(&#39;keydown&#39;, (e) =&gt; &#123;
        if (e.key === &#39;ArrowLeft&#39;) changeSlide(-1);
        if (e.key === &#39;ArrowRight&#39;) changeSlide(1);
        if (e.key === &#39; &#39;) &#123; e.preventDefault(); isPlaying = !isPlaying; &#125;
    &#125;);

    createHearts();
    startProgress();

    // Confession module
    const EMAIL_TO = &#39;1449035468@qq.com&#39;;

    function sendConfession(type) &#123;
        const timestamp = new Date().toLocaleString(&#39;zh-CN&#39;);
        let subject, body, toastIcon, toastMsg;

        if (type === &#39;accept&#39;) &#123;
            subject = encodeURIComponent(&#39;💌 收到一份甜甜的回复&#39;);
            body = encodeURIComponent(
                `有人对你的表白回复了「我愿意」！\n\n` +
                `时间：$&#123;timestamp&#125;\n` +
                `回复：我愿意💕\n\n` +
                `祝你们幸福！`
            );
            toastIcon = &#39;🎉&#39;;
            toastMsg = &#39;已收到你的心意，邮件正在发送~&#39;;
        &#125; else &#123;
            subject = encodeURIComponent(&#39;💌 收到一份温柔的回复&#39;);
            body = encodeURIComponent(
                `有人对你的表白回复了「还要考虑」。\n\n` +
                `时间：$&#123;timestamp&#125;\n` +
                `回复：还要考虑🌸\n\n` +
                `耐心等待，幸福会来的。`
            );
            toastIcon = &#39;🤔&#39;;
            toastMsg = &#39;已收到你的回复，邮件正在发送~&#39;;
        &#125;

        const mailtoLink = `mailto:$&#123;EMAIL_TO&#125;?subject=$&#123;subject&#125;&amp;body=$&#123;body&#125;`;

        // Show toast
        showToast(toastIcon, toastMsg);

        // Open mail client after a short delay
        setTimeout(() =&gt; &#123;
            window.location.href = mailtoLink;
        &#125;, 800);
    &#125;

    function showToast(icon, msg) &#123;
        const toast = document.getElementById(&#39;toast&#39;);
        document.getElementById(&#39;toastIcon&#39;).textContent = icon;
        document.getElementById(&#39;toastMsg&#39;).textContent = msg;
        toast.classList.add(&#39;show&#39;);
        setTimeout(() =&gt; &#123;
            toast.classList.remove(&#39;show&#39;);
        &#125;, 3000);
    &#125;
